# ============================================================
# channel-delivery Continuous Integration Pipeline
# ============================================================
# Purpose:
# - Run quality checks on every push / PR
# - Execute Unit tests
# - Validate composer configuration
# - Run security audit
# - Run static analysis (PHPStan)
# - Ensure syntax integrity
#
# Design Principles:
# - Deterministic environment (no reliance on local secrets)
# - Real database (no SQLite fallback)
# - Crypto key ring injected via CI
# - Multi-PHP version matrix
# ============================================================

name: channel-delivery CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  quality:
    name: Quality Checks (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    # -------------------------------------------------
    # Global Environment (Shared Across All Steps)
    # -------------------------------------------------
    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_NAME: channel_delivery_test
      DB_USER: root
      DB_PASS: root

    # -------------------------------------------------
    # PHP Version Matrix
    # -------------------------------------------------
    strategy:
      fail-fast: false
      matrix:
        php: [ "8.2", "8.3", "8.4" ]

    # -------------------------------------------------
    # MySQL Service Container
    # -------------------------------------------------
    services:
      mysql:
        image: mysql:9.2
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      # -------------------------------------------------
      # 1) Checkout Repository
      # -------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------------------------------
      # 2) Setup PHP Runtime
      # -------------------------------------------------
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer
          coverage: none

      # -------------------------------------------------
      # 3) Cache Composer Dependencies
      # -------------------------------------------------
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      # -------------------------------------------------
      # 4) Validate composer.json Structure
      # -------------------------------------------------
      - name: Validate composer.json
        run: composer validate --strict

      # -------------------------------------------------
      # 5) Install Project Dependencies
      # -------------------------------------------------
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      # -------------------------------------------------
      # 6) Verify Platform Requirements
      # -------------------------------------------------
      - name: Check platform requirements
        run: composer check-platform-reqs

      # -------------------------------------------------
      # 7) Security Audit (Fail on Vulnerabilities)
      # -------------------------------------------------
      - name: Composer Security Audit
        run: composer audit --format=plain

      # -------------------------------------------------
      # 8) Wait for MySQL to Become Ready
      # -------------------------------------------------
      - name: Wait for MySQL
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y mysql-client
          for i in {1..20}; do
            mysqladmin ping -h "$DB_HOST" -P "$DB_PORT" -u "$DB_USER" -p"$DB_PASS" && break
            sleep 2
          done

      # -------------------------------------------------
      # 9) Create Test Database + Run Migrations
      # -------------------------------------------------
      - name: Create test database and run migrations
        run: |
          mysql --protocol=tcp \
            -h "$DB_HOST" \
            -P "$DB_PORT" \
            -u "$DB_USER" \
            -p"$DB_PASS" \
            -e "CREATE DATABASE IF NOT EXISTS \`$DB_NAME\` CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"

          mysql --protocol=tcp \
            -h "$DB_HOST" \
            -P "$DB_PORT" \
            -u "$DB_USER" \
            -p"$DB_PASS" \
            "$DB_NAME" < migrations/001_create_email_queue.sql

          mysql --protocol=tcp \
            -h "$DB_HOST" \
            -P "$DB_PORT" \
            -u "$DB_USER" \
            -p"$DB_PASS" \
            "$DB_NAME" < migrations/002_create_api_keys.sql

          mysql --protocol=tcp \
            -h "$DB_HOST" \
            -P "$DB_PORT" \
            -u "$DB_USER" \
            -p"$DB_PASS" \
            "$DB_NAME" < migrations/003_optimize_worker_poll_index.sql

      # -------------------------------------------------
      # 10) Run PHPUnit (Unit Tests)
      # -------------------------------------------------
      # Crypto key material must be exactly 32 bytes.
      # "12345678901234567890123456789012" = 32 ASCII chars.
      - name: Run PHPUnit
        env:
          APP_ENV: testing
          APP_DEBUG: "false"
          APP_NAME: "channel-delivery-ci"
          SUPPORT_EMAIL: "ci@example.com"

          # Database
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: channel_delivery_test
          DB_USERNAME: root
          DB_PASSWORD: root

          # Crypto key ring (32 bytes for AES-256-GCM)
          CRYPTO_ACTIVE_KEY_ID: v1
          CRYPTO_KEYS: '[{"id":"v1","key":"12345678901234567890123456789012"}]'

          # Redis
          REDIS_HOST: "127.0.0.1"
          REDIS_PORT: "6379"
          REDIS_PASSWORD: ""
          REDIS_DB: "0"

          # Rate limiting
          RATE_LIMIT_MAX_REQUESTS: "1000"
          RATE_LIMIT_WINDOW_SECONDS: "60"

          # Trusted proxies (empty in CI = direct connection)
          TRUSTED_PROXIES: ""

          # SMTP (disabled in CI — unit tests don't send real emails)
          MAIL_HOST: "127.0.0.1"
          MAIL_PORT: "1025"
          MAIL_USERNAME: "ci"
          MAIL_PASSWORD: "ci"
          MAIL_FROM_ADDRESS: "ci@example.com"
          MAIL_FROM_NAME: "CI"
          MAIL_ENCRYPTION: ""
          MAIL_DEBUG_LEVEL: "0"

        run: composer test

      # -------------------------------------------------
      # 11) Static Analysis (PHPStan)
      # -------------------------------------------------
      - name: Run PHPStan
        run: composer analyse

      # -------------------------------------------------
      # 12) Syntax Lint Check
      # -------------------------------------------------
      - name: Lint PHP files
        run: |
          find ./src ./Modules ./tests -type f -name "*.php" -print0 \
            | xargs -0 -n1 php -l